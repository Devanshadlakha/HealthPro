# Server
server.port=${SERVER_PORT:8081}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=${JWT_SECRET:}

# Email (Mailtrap)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:3001}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001}

# Razorpay (Test Mode)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# AI Chatbot
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.api-url=${CHATBOT_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

# Scheduling
spring.main.allow-bean-definition-overriding=true

# Uploads (served as static resources)
app.upload-dir=${UPLOAD_DIR:uploads}

# Multipart limits (photo uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=5MB
server.tomcat.max-swallow-size=5MB
