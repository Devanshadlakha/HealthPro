# Server — Render injects PORT; SERVER_PORT works for local dev
server.port=${PORT:${SERVER_PORT:8081}}

# Disable Spring's auto-generated default user — auth is JWT-based, not form login
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:}
spring.data.mongodb.auto-index-creation=true

# JWT
jwt.secret=${JWT_SECRET:}
# Token lifetime in milliseconds (default 24h)
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email (Mailtrap)
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL
app.frontend-url=${FRONTEND_URL:http://localhost:3001}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3001}

# Auth cookie — set COOKIE_SECURE=true in production (requires HTTPS).
# When true, cookies are issued with Secure + SameSite=None for cross-origin frontends.
app.cookie-secure=${COOKIE_SECURE:false}

# Razorpay (Test Mode)
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# AI Chatbot
chatbot.api-key=${CHATBOT_API_KEY:}
chatbot.api-url=${CHATBOT_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent}

# Scheduling
spring.main.allow-bean-definition-overriding=true

# Seed (admin) — leave SEED_TOKEN unset in production to disable /seed/** entirely.
app.seed.token=${SEED_TOKEN:}

# Auth rate limit — max failed login attempts per IP within the window
app.auth.rate-limit.max-attempts=${AUTH_MAX_ATTEMPTS:5}
app.auth.rate-limit.window-seconds=${AUTH_WINDOW_SECONDS:60}

# Uploads (served as static resources)
app.upload-dir=${UPLOAD_DIR:uploads}

# Multipart limits — accommodates 10 MB patient report attachments.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
server.tomcat.max-http-form-post-size=12MB
server.tomcat.max-swallow-size=12MB

# Appointment reminder scheduler
app.reminder.lead-minutes=${REMINDER_LEAD_MINUTES:30}
app.reminder.poll-rate-ms=${REMINDER_POLL_RATE_MS:300000}
